logging:
  logs:
    default:
      level: INFO

storage:
  module: file_system
  root: /data

apps:
  tls:
    certificates:
      automate:
        - livekit.speaksy.online
        - turn.speaksy.online
        - ops.speaksy.online
        - dashboard.speaksy.online

  http:
    servers:

      redirects:
        listen:
          - ":80"

        routes:

          - match:
              - host:
                  - ops.speaksy.online
            handle:
              - handler: static_response
                headers:
                  Location:
                    - "https://{http.request.host}{http.request.uri}"
                status_code: 308

          - match:
              - host:
                  - dashboard.speaksy.online
            handle:
              - handler: static_response
                headers:
                  Location:
                    - "https://{http.request.host}{http.request.uri}"
                status_code: 308

      ops_https:
        listen:
          - ":8443"

        routes:
          - match:
              - host:
                  - ops.speaksy.online

            handle:
              - handler: reverse_proxy
                upstreams:
                  - dial: "127.0.0.1:8001"

      dashboard_https:
        listen:
          - ":8444"

        routes:
          - match:
              - host:
                  - dashboard.speaksy.online

            handle:
              - handler: reverse_proxy
                upstreams:
                  - dial: "127.0.0.1:8000"

  layer4:
    servers:

      main:
        listen:
          - ":443"

        routes:

          #
          # TURN
          #

          - match:
              - tls:
                  sni:
                    - turn.speaksy.online

            handle:
              - handler: tls
              - handler: proxy
                upstreams:
                  - dial:
                      - "151.185.45.90:5349"

          #
          # LIVEKIT
          #

          - match:
              - tls:
                  sni:
                    - livekit.speaksy.online

            handle:
              - handler: tls
                connection_policies:
                  - alpn:
                      - http/1.1

              - handler: proxy
                upstreams:
                  - dial:
                      - "127.0.0.1:7880"

          #
          # LIVEKIT OPS DASHBOARD
          #

          - match:
              - tls:
                  sni:
                    - ops.speaksy.online

            handle:
              - handler: proxy
                upstreams:
                  - dial:
                      - "127.0.0.1:8443"

          #
          # VOICE DASHBOARD
          #

          - match:
              - tls:
                  sni:
                    - dashboard.speaksy.online

            handle:
              - handler: proxy
                upstreams:
                  - dial:
                      - "127.0.0.1:8444"
